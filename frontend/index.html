<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwiftBite Frontend Launcher</title>
    <meta http-equiv="refresh" content="0; url=http://localhost:3000" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, sans-serif;
        color: #e5eefc;
        background: linear-gradient(180deg, #030712, #111827);
      }

      a {
        color: #67e8f9;
      }

      .box {
        max-width: 640px;
        padding: 28px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(15, 23, 42, 0.72);
        backdrop-filter: blur(18px);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Redirecting to the real UI</h1>
      <p>
        The Next.js app runs at <a href="http://localhost:3000">http://localhost:3000</a>.
      </p>
    </div>
  </body>
</html>
