<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <!-- Beige rounded background with dark moss green border; centers /sticker.png -->
  <rect x="0" y="0" width="192" height="192" rx="28" fill="#f6efe2" stroke="#223326" stroke-width="14" />
  <defs>
    <clipPath id="stickerClip">
      <rect x="20" y="20" width="152" height="152" rx="20" />
    </clipPath>
  </defs>
  <g clip-path="url(#stickerClip)">
    <image href="/sticker.png" x="14" y="14" width="164" height="164" preserveAspectRatio="xMidYMid meet" />
  </g>
  <!-- Add subtle drop shadow for sticker to sit above the border -->
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.18" />
  </filter>
  <g filter="url(#shadow)">
    <image href="/sticker.png" x="14" y="14" width="164" height="164" preserveAspectRatio="xMidYMid meet" opacity="1" />
  </g>
</svg>