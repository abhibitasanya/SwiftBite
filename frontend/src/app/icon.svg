<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <!-- Beige background with dark-green border and embedded sticker image -->
  <rect x="0" y="0" width="192" height="192" rx="28" fill="#223326" stroke="#18321d" stroke-width="8" />
  <!-- The app sticker image should be placed at /public/sticker.png -->
  <defs>
    <clipPath id="stickerClip">
      <rect x="18" y="18" width="156" height="156" rx="20" />
    </clipPath>
  </defs>
  <g clip-path="url(#stickerClip)">
    <image href="/sticker.svg" x="18" y="18" width="156" height="156" preserveAspectRatio="xMidYMid meet" />
  </g>
</svg>